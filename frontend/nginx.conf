# Nginx · Frontend DESAFIO-26
# Sirve el SPA estático y hace de reverse proxy de /api hacia el backend Express.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión básica para los estáticos.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA: cualquier ruta de cliente cae en index.html (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API: se reenvía al backend por nombre de servicio en la red Docker.
    # Sin barra final en proxy_pass → se conserva el prefijo /api del backend.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
