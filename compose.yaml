# compose.yaml — PostgreSQL + backend local de desarrollo para DESAFIO-26
# Uso: docker compose up -d postgres backend
# Ver instrucciones completas en docs/docker-backend.md y docs/database.md

services:
  postgres:
    image: postgres:16-alpine
    container_name: desafio26_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: desafio26_dev
      POSTGRES_USER: desafio26
      POSTGRES_PASSWORD: desafio26_dev_password
    ports:
      - "5434:5432"
    volumes:
      - desafio26_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U desafio26 -d desafio26_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: desafio26_backend
    restart: unless-stopped
    # Espera a que PostgreSQL esté healthy antes de arrancar.
    depends_on:
      postgres:
        condition: service_healthy
    # Carga en RUNTIME las flags del asistente y la CLOUD_ASSISTANT_API_KEY desde el .env del
    # host (LLM_ASSISTANT_*, CLOUD_ASSISTANT_*, DATA_RECOMMENDER_*). NO se hornea en la imagen:
    # .dockerignore ya excluye .env. Las claves de `environment` (abajo) tienen PRIORIDAD sobre
    # env_file, así que el DATABASE_URL/CLIENT_URL de Docker prevalecen sobre los del .env (host).
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 3000
      # IMPORTANTE: dentro de Docker el host de la DB es `postgres` (nombre del servicio),
      # NO `localhost`. Credenciales de desarrollo local (no secretos reales).
      DATABASE_URL: "postgresql://desafio26:desafio26_dev_password@postgres:5432/desafio26_dev?schema=public"
      CLIENT_URL: "http://localhost:5173"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/ready').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]

volumes:
  desafio26_postgres_data:
    name: desafio26_postgres_data
